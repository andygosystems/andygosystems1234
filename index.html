    <link rel="canonical" href="https://krugerrbrendt.com/" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Default SEO meta (overridden per-page by SEO component) -->
    <title>Krugerr Brendt Real Estate Kenya | Luxury Properties for Sale & Rent</title>
    <meta name="description" content="Discover luxury properties for sale and rent in Nairobi, Mombasa and across Kenya. Krugerr Brendt Real Estate — your exclusive real estate partner for premium homes, villas, and apartments." />
    <meta name="keywords" content="Krugerr Brendt, luxury real estate Kenya, properties for sale Nairobi, houses for rent Mombasa, premium homes Kenya, real estate agent Nairobi, luxury villas Kenya, exclusive properties Kenya" />
    <meta property="og:site_name" content="Krugerr Brendt Real Estate" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://krugerrbrendt.com/logo-gold.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:url" content="https://krugerrbrendt.com/" />
    <meta property="og:title" content="Krugerr Brendt Real Estate Kenya | Luxury Properties for Sale & Rent" />
    <meta property="og:description" content="Discover luxury properties for sale and rent in Nairobi, Mombasa and across Kenya. Your exclusive real estate partner." />

    <!-- JSON-LD Structured Data: Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://krugerrbrendt.com/#organization",
          "name": "Krugerr Brendt Real Estate",
          "alternateName": "Krugerr Brendt",
          "url": "https://krugerrbrendt.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://krugerrbrendt.com/logo-gold.png",
            "width": 512,
            "height": 512
          },
          "image": "https://krugerrbrendt.com/logo-gold.png",
          "description": "Luxury real estate agency specializing in premium properties for sale and rent in Nairobi, Mombasa, and across Kenya.",
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "KE",
            "addressRegion": "Nairobi"
          },
          "areaServed": {
            "@type": "Place",
            "name": "Kenya",
            "containsPlace": [
              { "@type": "City", "name": "Nairobi" },
              { "@type": "City", "name": "Mombasa" },
              { "@type": "City", "name": "Kilifi" },
              { "@type": "City", "name": "Malindi" },
              { "@type": "City", "name": "Watamu" }
            ]
          },
          "knowsAbout": ["Real Estate", "Luxury Homes", "Property Investment", "Kenya Real Estate"],
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://krugerrbrendt.com/#website",
          "url": "https://krugerrbrendt.com",
          "name": "Krugerr Brendt Real Estate",
          "alternateName": "Krugerr Brendt",
          "publisher": { "@id": "https://krugerrbrendt.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://krugerrbrendt.com/buy?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "WebPage",
          "@id": "https://krugerrbrendt.com/#webpage",
          "url": "https://krugerrbrendt.com/",
          "name": "Krugerr Brendt Real Estate Kenya | Luxury Properties for Sale & Rent",
          "isPartOf": { "@id": "https://krugerrbrendt.com/#website" },
          "about": { "@id": "https://krugerrbrendt.com/#organization" },
          "description": "Discover luxury properties for sale and rent in Nairobi, Mombasa and across Kenya."
        }
      ]
    }
    </script>
